name: CI - Multi Gateway API

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      mysql:
        image: mysql:8.0.45
        env:
          MYSQL_DATABASE: payment_system_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, dom, curl, libxml, mysql, pdo_mysql, bcmath
        coverage: xdebug

    - name: Install Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Copy .env.testing
      run: php -r "file_exists('.env.testing') || copy('.env.example', '.env.testing');"

    - name: Generate Key
      run: php artisan key:generate --env=testing

    - name: Run Migrations
      run: php artisan migrate --env=testing
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: payment_system_test
        DB_USERNAME: root
        DB_PASSWORD: root

    - name: Execute Tests
      run: vendor/bin/phpunit
      env:
        DB_CONNECTION: mysql
        DB_HOST: 127.0.0.1
        DB_PORT: 3306
        DB_DATABASE: payment_system_test
        DB_USERNAME: root
        DB_PASSWORD: root